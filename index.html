<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Sistem Kas MWW</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --tosca: #008080; }
        body { background-color: #f4f7f6; font-family: sans-serif; }
        .navbar { background-color: var(--tosca); color: white; padding: 1rem; }
        .card { border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); border: none; }
        .btn-tosca { background-color: var(--tosca); color: white; }
    </style>
</head>
<body>

<!-- Halaman Login -->
<div id="loginPage" class="container mt-5" style="max-width: 400px;">
    <div class="card p-4 text-center">
        <h4>MWW SULAWESI TENGAH</h4>
        <input type="text" id="user" class="form-control mb-2" placeholder="Username">
        <input type="password" id="pass" class="form-control mb-2" placeholder="Kata Sandi">
        <button class="btn btn-tosca w-100" onclick="login()">MASUK SISTEM</button>
    </div>
</div>

<!-- Dashboard -->
<div id="dashboardPage" class="container mt-4" style="display:none;">
    <nav class="navbar mb-4 rounded"><h4>Dashboard Kas</h4><span id="userLog"></span></nav>
    <div class="row">
        <div class="col-md-6"><div class="card p-3 mb-3"><h6>Saldo Awal</h6><h4 id="saldoAwal">Rp 16.152.981</h4></div></div>
        <div class="col-md-6"><div class="card p-3 mb-3"><h6>Saldo Akhir</h6><h4 id="saldoAkhir">Rp 15.711.218</h4></div></div>
    </div>
    
    <div class="card p-4 mt-3">
        <h5>Riwayat Transaksi</h5>
        <table class="table table-hover mt-3">
            <thead style="background-color: var(--tosca); color: white;">
                <tr><th>Tanggal</th><th>Jenis Arus Kas</th><th>Uang Keluar</th><th>Uang Masuk</th><th>Uraian</th></tr>
            </thead>
            <tbody id="tabelBody"></tbody>
        </table>
    </div>
</div>

<script>
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbwMr9h-Z2YZmynE0z4ReEoPLQsGiudESVNYXm-lYm1IoXi5vC45Ch2_3p0vseGjR0tbmg/exec"; // Ganti dengan URL deployment Anda

    function login() {
        let u = document.getElementById('user').value;
        let p = document.getElementById('pass').value;
        if ((u == 'Ketua' && p == 'Muslimah') || (u == 'Bendahara' && p == 'Wahdah')) {
            localStorage.setItem("user", u);
            document.getElementById('loginPage').style.display = 'none';
            document.getElementById('dashboardPage').style.display = 'block';
            document.getElementById('userLog').innerText = "Halo, " + u;
            loadData();
        } else { alert("Login Gagal!"); }
    }

    function loadData() {
        fetch(WEB_APP_URL)
            .then(response => response.json())
            .then(data => {
                let tbody = document.getElementById('tabelBody');
                tbody.innerHTML = "";
                data.forEach(row => {
                    let tr = document.createElement('tr');
                    tr.innerHTML = `<td>${row[2]}</td><td>${row[3]}</td><td>${row[4]}</td><td>${row[5]}</td><td>${row[6]}</td>`;
                    tbody.appendChild(tr);
                });
            });
    }
</script>
</body>
</html>
